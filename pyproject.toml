[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["api", "ingestion", "mlops", "shared"]
omit = ["tests/*", "*/migrations/*", "**/__main__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501", "B008"]   # long lines OK; FastAPI Depends() in signatures OK
exclude = [".venv", "__pycache__", "*.egg-info"]
