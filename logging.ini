[loggers]
keys=root,api,ingestion,config

[handlers]
keys=console,file

[formatters]
keys=standard,json_like

# ── Loggers ───────────────────────────────────────────────────────────────────
[logger_root]
level=INFO
handlers=console

[logger_api]
level=INFO
handlers=console
qualname=api
propagate=0

[logger_ingestion]
level=INFO
handlers=console
qualname=ingestion
propagate=0

[logger_config]
level=WARNING
handlers=console
qualname=config
propagate=0

# ── Handlers ──────────────────────────────────────────────────────────────────
[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_file]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=json_like
args=('logs/app.log', 'a', 10485760, 5, 'utf-8')

# ── Formatters ────────────────────────────────────────────────────────────────
[formatter_standard]
format=%(asctime)s  %(levelname)-8s  %(name)s  %(message)s
datefmt=%Y-%m-%dT%H:%M:%S

[formatter_json_like]
format={"time": "%(asctime)s", "level": "%(levelname)s", "logger": "%(name)s", "msg": "%(message)s"}
datefmt=%Y-%m-%dT%H:%M:%SZ
