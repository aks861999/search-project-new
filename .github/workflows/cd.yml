name: CD — Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "ingestion/**"
      - "mlops/**"
      - "config/**"
      - "docker-compose.yml"
      - "docker-compose.mlops.yml"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/wurth-search

jobs:
  # ── Guard: CI must pass first ───────────────────────────────────────────────
  ci-check:
    name: Verify CI green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps
        run: |
          pip install --upgrade pip
          pip install pytest==8.3.5 pytest-asyncio==0.25.3 \
            fastapi==0.115.12 httpx==0.28.1 opensearch-py==2.8.0 \
            pydantic==2.11.1 pydantic-settings==2.8.1 redis==5.2.1 \
            langchain==0.3.21 langchain-core==0.3.47 uvicorn==0.34.0 numpy
      - name: Run full test suite
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  # ── Build and push Docker images ────────────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write
    outputs:
      api-image: ${{ steps.meta-api.outputs.tags }}
      ingestion-image: ${{ steps.meta-ingestion.outputs.tags }}
      worker-image: ${{ steps.meta-worker.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # API image
      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          build-args: SKIP_MODEL_DOWNLOAD=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ingestion image
      - name: Extract metadata (Ingestion)
        id: meta-ingestion
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ingestion
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Ingestion image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ingestion/Dockerfile
          push: true
          tags: ${{ steps.meta-ingestion.outputs.tags }}
          build-args: SKIP_MODEL_DOWNLOAD=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # MLOps Worker image
      - name: Extract metadata (Worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/mlops/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          build-args: SKIP_MODEL_DOWNLOAD=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.wurth-search.internal/docs

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.STAGING_SSH_KEY }}
          known_hosts: ${{ secrets.STAGING_KNOWN_HOSTS }}

      - name: Deploy to staging server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          API_IMAGE: ${{ needs.build-and-push.outputs.api-image }}
          WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker-image }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh $STAGING_USER@$STAGING_HOST << 'ENDSSH'
            set -e
            cd /opt/wurth-search

            # Pull latest images
            echo $GH_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.mlops.yml pull api celery-ingestion celery-evaluation

            docker compose -f infra/docker-compose.yml -f infra/docker-compose.mlops.yml \
              up -d --no-deps --force-recreate api

            docker compose -f infra/docker-compose.yml -f infra/docker-compose.mlops.yml \
              up -d --no-deps --force-recreate celery-ingestion celery-evaluation celery-beat

            # Health check
            sleep 15
            curl -sf http://localhost:8000/health | grep -q '"status":"ok"'
            echo "Staging deployment successful"
          ENDSSH

      - name: Run smoke tests against staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          pip install httpx
          PYTHONPATH=. python scripts/smoke_test.py \
            --base-url https://staging.wurth-search.internal

  # ── Notify on failure ───────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [ci-check, build-and-push, deploy-staging]
    if: failure()
    steps:
      - name: Post failure to Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":red_circle: *Würth Search CD failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":red_circle: *CD Pipeline Failed*\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
